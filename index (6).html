const AT_HEADERS = { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' };

async function atFetch(url, opts={}) {
  const r = await fetch(url, { ...opts, headers: { ...AT_HEADERS, ...(opts.headers||{}) } });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadAllTasks() {
  let records = [], offset = null;
  do {
    const url = AT_URL + '?pageSize=100' + (offset ? '&offset='+offset : '');
    const d = await atFetch(url);
    records = records.concat(d.records);
    offset = d.offset;
  } while (offset);
  return records;
}

async function createTask(fields) {
  return atFetch(AT_URL, { method: 'POST', body: JSON.stringify({ records: [{ fields }] }) });
}

async function updateTask(id, fields) {
  return atFetch(`${AT_URL}/${id}`, { method: 'PATCH', body: JSON.stringify({ fields }) });
}

async function deleteTaskAt(id) {
  return atFetch(`${AT_URL}/${id}`, { method: 'DELETE' });
}

                React.createElement('input', {style:S.input, value:newLink.url, onChange:e=>setNewLink(p=>({...p,url:e.target.value})), placeholder:'https://...'})
              )
            ),
            React.createElement('button', {onClick:addLink, disabled:saving||!newLink.url,
              style:{background:headerBg,color:'#fff',border:'none',borderRadius:10,padding:'10px 20px',fontSize:14,fontWeight:600,opacity:(saving||!newLink.url)?0.5:1}},
              'Link opslaan'
            )
          ),
          loadingLinks
            ? React.createElement('div', {style:{textAlign:'center',color:'#aaa',padding:20,fontSize:13}}, 'Links laden...')
            : links.length===0
              ? React.createElement('div', {style:{...S.card,textAlign:'center',color:'#bbb',fontSize:13,padding:24}}, 'Nog geen links toegevoegd')
              : React.createElement('div', {style:{display:'grid',gap:8}},
                  links.map(r=>{
                    const icons = {'Google Drive':'📁','Contentkalender':'📅','Canva':'🎨','Loomly':'📋','Shootmap':'📸','Briefing':'📄','Andere':'🔗'};
                    const icon = icons[r.fields.Categorie]||'🔗';
                    return React.createElement('div', {key:r.id,
                      style:{background:'#fff',borderRadius:10,padding:'13px 16px',display:'flex',alignItems:'center',gap:12,border:'1px solid #f0f0f0'}},
                      React.createElement('span', {style:{fontSize:20}}, icon),
                      React.createElement('div', {style:{flex:1}},
                        React.createElement('div', {style:{fontSize:12,color:'#aaa',marginBottom:2}}, r.fields.Categorie),
                        React.createElement('a', {href:r.fields.Links, target:'_blank',
                          style:{fontSize:14,color:headerBg,textDecoration:'none',fontWeight:500,wordBreak:'break-all'}},
                          r.fields.Links
                        )
                      ),
                      React.createElement('button', {onClick:()=>removeLink(r.id),
                        style:{background:'transparent',border:'none',color:'#ddd',fontSize:18,padding:'0 4px',lineHeight:1}}, '×')
                    );
                  })
                )
        ),
        // INFO TAB
        tab==='info' && React.createElement('div', {style:{display:'grid',gap:12}},
          React.createElement('div', {style:S.card},
            React.createElement('div', {style:S.sectionLabel}, 'Maandelijks terugkerend'),
            activeClient.monthly.map((m,i)=>React.createElement('div',{key:i,style:{display:'flex',gap:8,marginBottom:8,alignItems:'center'}},
              React.createElement('div',{style:{width:6,height:6,borderRadius:'50%',background:activeClient.accent,flexShrink:0}}),
              React.createElement('span',{style:{fontSize:14}},m)
            ))
          ),
          React.createElement('div', {style:S.card},
            React.createElement('div', {style:S.sectionLabel}, 'Tone of voice'),
            React.createElement('div', {style:{fontSize:14,lineHeight:1.8,color:'#444'}}, activeClient.tov)
          ),
          React.createElement('div', {style:S.card},
            React.createElement('div', {style:S.sectionLabel}, 'Wat loopt er nu'),
            activeClient.running.map((r,i)=>React.createElement('div',{key:i,style:{display:'flex',gap:8,marginBottom:8,alignItems:'flex-start'}},
              React.createElement('div',{style:{width:6,height:6,borderRadius:'50%',background:'#888',flexShrink:0,marginTop:6}}),
              React.createElement('span',{style:{fontSize:14}},r)
            ))
          )
        ),

        // CHAOS TAB
        tab==='chaos' && React.createElement('div', {style:S.card},
          React.createElement('div', {style:S.sectionLabel}, 'Aandachtspunten & chaos'),
          activeClient.chaos.map((c,i)=>React.createElement('div',{key:i,
            style:{display:'flex',gap:10,marginBottom:10,padding:'10px 14px',background:'#FFF8E1',borderRadius:8,alignItems:'flex-start'}},
            React.createElement('span',{style:{fontSize:16}},'⚡'),
            React.createElement('span',{style:{fontSize:14}},c)
          ))
        )
      )
      ,

      // ADMIN LOGIN
      view==='adminlogin' && React.createElement('div', {style:{maxWidth:340,margin:'60px auto'}},
        React.createElement('div', {style:{background:'#fff',borderRadius:16,padding:32,boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}},
          React.createElement('div', {style:{fontFamily:"'DM Serif Display',serif",fontSize:22,marginBottom:6}}, '🔒 Admin'),
          React.createElement('div', {style:{fontSize:13,color:'#888',marginBottom:24}}, 'Alleen voor Fenna & Lisette'),
          React.createElement('div', {style:{marginBottom:12}},
            React.createElement('label', {style:{fontSize:11,color:'#aaa',display:'block',marginBottom:4}}, 'Pincode'),
            React.createElement('input', {type:'tel', maxLength:4, style:{width:'100%',padding:'12px',borderRadius:8,border:adminPinError?'1px solid #e53935':'1px solid #e0e0e0',fontSize:18,textAlign:'center',letterSpacing:8,boxSizing:'border-box'},
              value:adminPin,
              onChange:e=>{ setAdminPin(e.target.value); setAdminPinError(false); },
              onKeyDown:e=>{ if(e.key==='Enter'){ if(adminPin.trim()===ADMIN_PIN){ setShowAdmin(true); setView('admin'); setAdminPin(''); } else { setAdminPinError(true); setAdminPin(''); }}}
            })
          ),
          adminPinError && React.createElement('div', {style:{color:'#e53935',fontSize:12,marginBottom:12}}, 'Onjuiste pincode'),
          React.createElement('button', {
            onClick:()=>{ if(adminPin.trim()===ADMIN_PIN){ setShowAdmin(true); setView('admin'); setAdminPin(''); } else { setAdminPinError(true); setAdminPin(''); }},
            style:{width:'100%',background:'#1a1a1a',color:'#fff',border:'none',borderRadius:10,padding:'12px',fontSize:14,fontWeight:600}
          }, 'Inloggen')
        )
      ),

      // ADMIN DASHBOARD
      view==='admin' && showAdmin && React.createElement('div', null,
        React.createElement('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}},
          React.createElement('div', {style:{fontFamily:"'DM Serif Display',serif",fontSize:22}}, 'Admin'),
          React.createElement('div', {style:{display:'flex',gap:4,background:'#f0f0f0',padding:4,borderRadius:10}},
            ['klanten','werknemers'].map(t=>React.createElement('button', {key:t,onClick:()=>setAdminTab(t),
              style:{background:adminTab===t?'#fff':'transparent',border:'none',borderRadius:8,padding:'7px 16px',fontSize:13,fontWeight:adminTab===t?600:400,color:adminTab===t?'#1a1a1a':'#777'}},
              t==='klanten'?'Klanten':'Werknemers'
            ))
          )
        ),

        adminTab==='klanten' && React.createElement('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}},
          [...CLIENTS_CH,...CLIENTS_SJ].map(client=>{
            const clientAdminNotes = (adminNotes[client.name]||{});
            return React.createElement('div', {key:client.id,style:{background:'#fff',borderRadius:14,padding:20,border:'1px solid #f0f0f0'}},
              React.createElement('div', {style:{fontWeight:600,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}},
                React.createElement('div', {style:{width:8,height:8,borderRadius:'50%',background:client.accent}}),
                client.name
              ),
              ['Factuur','Besproken','Te doen','Contracten','BTW'].map(veld=>
                React.createElement('div', {key:veld,style:{marginBottom:10}},
                  React.createElement('label', {style:{fontSize:11,color:'#aaa',display:'block',marginBottom:3}}, veld),
                  React.createElement('textarea', {
                    rows:2,
                    style:{width:'100%',padding:'8px',borderRadius:6,border:'1px solid #e0e0e0',fontSize:12,resize:'vertical',boxSizing:'border-box',fontFamily:'inherit'},
                    value:(clientAdminNotes[veld]||''),
                    onChange:e=>setAdminNotes(p=>({...p,[client.name]:{...(p[client.name]||{}),[veld]:e.target.value}})),
                    placeholder:'Notitie voor '+veld+'...'
                  })
                )
              ),
              React.createElement('button', {
                onClick:async()=>{
                  setAdminSaving(true);
                  try { showToast('Opgeslagen voor '+client.name); }
                  finally { setAdminSaving(false); }
                },
                style:{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:8,padding:'8px 16px',fontSize:12,fontWeight:600,width:'100%'}
              }, adminSaving?'Opslaan...':'Opslaan')
            );
          })
        ),

        adminTab==='werknemers' && React.createElement('div', null,
          React.createElement('div', {style:{display:'flex',gap:4,background:'#f0f0f0',padding:4,borderRadius:10,width:'fit-content',marginBottom:20}},
            ['Fenna','Lisette'].map(naam=>React.createElement('button', {key:naam,onClick:()=>setAdminWie(naam),
              style:{background:adminWie===naam?'#fff':'transparent',border:'none',borderRadius:8,padding:'7px 20px',fontSize:13,fontWeight:adminWie===naam?600:400,color:adminWie===naam?'#1a1a1a':'#777'}},
              naam
            ))
          ),
          React.createElement('div', {style:{maxWidth:560}},
            React.createElement('div', {style:{background:'#fff',borderRadius:14,padding:20,border:'1px solid #f0f0f0'}},
              React.createElement('div', {style:{fontWeight:600,fontSize:14,marginBottom:14}}, adminWie+' — Notities'),
              ['Focus deze week','Lopende projecten','Aandachtspunten','Verlof / afwezig','Overige notities'].map(veld=>
                React.createElement('div', {key:veld,style:{marginBottom:12}},
                  React.createElement('label', {style:{fontSize:11,color:'#aaa',display:'block',marginBottom:3}}, veld),
                  React.createElement('textarea', {
                    rows:3,
                    style:{width:'100%',padding:'8px',borderRadius:6,border:'1px solid #e0e0e0',fontSize:12,resize:'vertical',boxSizing:'border-box',fontFamily:'inherit'},
                    value:((werknemerTaken[adminWie]||{})[veld]||''),
                    onChange:e=>setWerknemerTaken(p=>({...p,[adminWie]:{...(p[adminWie]||{}),[veld]:e.target.value}})),
                    placeholder:veld+'...'
                  })
                )
              ),
              React.createElement('button', {
                onClick:()=>showToast('Opgeslagen voor '+adminWie),
                style:{background:'#1a1a1a',color:'#fff',border:'none',borderRadius:8,padding:'8px 16px',fontSize:12,fontWeight:600,width:'100%'}
              }, 'Opslaan')
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
